<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Clothes Remover</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f4f4f4;
            margin: 0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .drop-zone {
            border: 3px dashed #d32f2f;
            border-radius: 12px;
            padding: 50px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            background: #ffebee;
            border-color: #b71c1c;
        }
        button {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
        }
        button:hover { background: #b71c1c; }
        #status { margin: 20px 0; font-weight: bold; min-height: 28px; color: #d32f2f; }
        video { max-width: 100%; margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .warning { background: #fff3cd; padding: 15px; border-radius: 6px; margin: 20px 0; text-align: left; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Clothes Remover</h1>
        <p>Your 5-second clip is perfect</p>
        
        <div class="warning">
            <strong>⚠️ Important:</strong><br>
            Only use videos you own or have explicit consent for.<br>
            Non-consensual use is illegal.
        </div>

        <div id="dropZone" class="drop-zone">
            <p>📁 Tap to browse files (My Files)<br>or drag & drop</p>
            <input type="file" id="videoInput" accept="video/*,application/octet-stream" style="display: none;">
        </div>

        <button onclick="processVideo()">Remove Clothing</button>
        
        <div id="status"></div>
        <video id="outputVideo" controls style="display: none;"></video>
        
        <p style="margin-top: 30px; font-size: 14px;">
            After removal, download the base video and add custom clothing manually.
        </p>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('videoInput');
        let selectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                dropZone.innerHTML = `<p>✅ Selected: ${selectedFile.name}</p>`;
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                dropZone.innerHTML = `<p>✅ Selected: ${selectedFile.name}</p>`;
            }
        });

        async function processVideo() {
            if (!selectedFile) {
                alert("Please select a video first");
                return;
            }

            const status = document.getElementById('status');
            status.textContent = "Uploading to free API...";

            const formData = new FormData();
            formData.append('video', selectedFile);

            try {
                const response = await fetch('https://public-api.undresstool.fun/api/v1/video/undress', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errText = await response.text().catch(() => "Unknown error");
                    throw new Error(`API Error ${response.status}: ${errText}`);
                }

                const result = await response.json();
                const videoUrl = result.output_url || result.video_url || result.url || result.data?.url;

                if (videoUrl) {
                    const output = document.getElementById('outputVideo');
                    output.src = videoUrl;
                    output.style.display = 'block';
                    status.textContent = "✅ Done! Download the undressed video.";
                } else {
                    throw new Error("No output URL received");
                }
            } catch (error) {
                console.error(error);
                status.textContent = "❌ " + error.message + "\n\nTry again with your 5s clip.";
            }
        }
    </script>
</body>
</html>
